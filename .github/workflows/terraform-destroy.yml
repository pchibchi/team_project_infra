name: Terraform Destroy Dev

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to destroy all dev infrastructure"
        required: true
        default: "NO"

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    if: github.event.inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::683668078297:role/githubActionRole
          aws-region: ap-northeast-2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Check cluster existence
        id: check_cluster
        shell: bash
        run: |
          if aws eks describe-cluster \
            --region ap-northeast-2 \
            --name t3-dev-my-cluster >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update kubeconfig
        if: steps.check_cluster.outputs.exists == 'true'
        run: |
          aws eks update-kubeconfig \
          --region ap-northeast-2 \
          --name t3-dev-my-cluster

      - name: Delete ingress-nginx Service
        id: delete_ingress
        if: steps.check_cluster.outputs.exists == 'true'
        run: |
          set -euo pipefail

          LB_DNS="$(kubectl get service ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

          echo "lb_dns=${LB_DNS}" >> "$GITHUB_OUTPUT"

          if [ -n "${LB_DNS}" ]; then
            echo "LoadBalancer DNS: ${LB_DNS}"
          else
            echo "Load Balancer does not exist."
          fi

          kubectl delete service ingress-nginx-controller \
            -n ingress-nginx \
            --ignore-not-found=true

          kubectl wait --for=delete service/ingress-nginx-controller \
            -n ingress-nginx \
            --timeout=10m

      - name: Wait for Load Balancer to be deleted
        if: steps.check_cluster.outputs.exists == 'true'
        run: |
          set -euo pipefail

          LB_DNS="${{ steps.delete_ingress.outputs.lb_dns }}"

          if [ -z "${LB_DNS}" ]; then
            echo "LoadBalancer is already deleted."
            echo "Skip LB wait step."
            exit 0
          fi

          echo "Waiting for deleting LB with LB_DNS: ${LB_DNS}"

          for i in {1..40}; do
            RESULT="$(aws elbv2 describe-load-balancers \
              --region ap-northeast-2 \
              --query "LoadBalancers[?DNSName=='${LB_DNS}'].DNSName" \
              --output text)"

            if [ -z "${RESULT}" ] || [ "${RESULT}" = "None" ]; then
              echo "Load Balancer for DNS ${LB_DNS} has been deleted."
              exit 0
            fi

            echo "Load Balancer still exists: ${RESULT}"
            echo "Retrying in 15s..."
            sleep 15
          done

          echo "Timed out waiting for Load Balancer deletion: ${LB_DNS}"
          exit 1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -var-file="terraform.tfvars"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var-file="terraform.tfvars"
